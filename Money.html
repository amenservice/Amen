<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AMEN - Mobile Money Agent</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --card-bg: #1c232d; --glow-blue: #00d2ff;
            --title-yellow: #ffff00; --title-green: #00ff00; --title-red: #ff0000;
            --messenger-clr: #0084ff; --viber-clr: #7360f2; --telegram-clr: #229ED9; --whatsapp-clr: #25D366;
            --line-clr: #06C755;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center;
            height: 100dvh; background: #05070a; overflow: hidden;
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
        }
        .card { 
            width: 100%; max-width: 400px; height: 96%; max-height: 780px; 
            border-radius: 30px; padding: 2px; background: var(--glow-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); display: flex;
        }
        .card-inner { 
            background: var(--card-bg); border-radius: 28px; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between; overflow: hidden;
            padding: 0 0 20px 0; 
        }
        
        .top-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: calc(75px + env(safe-area-inset-top)); 
        }

        .header { padding: 5px 10px; text-align: center; }
        
        .header-container {
            display: inline-block;
            text-align: left;
            position: relative;
        }

        .header h1 { 
            font-size: 4.5rem; 
            color: white; 
            font-family: 'MedievalSharp'; 
            margin: 0;
            line-height: 1;
            display: flex;
            align-items: flex-start;
            position: relative;
        }

        .header h1 sup { 
            font-size: 0.45em; 
            font-weight: normal; 
            font-family: sans-serif; 
            color: #ffffff;
            margin-left: 4px;
            position: relative;
            top: 0.18em; 
        }
        
        .agent-title { 
            font-size: 0.95rem; 
            margin-top: 6px; 
            font-weight: bold; 
            width: 100%;
            display: flex;                  
            justify-content: space-between; 
            align-items: center;
        }
        .t-mobile, .t-money, .t-agent {
            display: flex;
            justify-content: space-between;
        }
        .t-mobile { color: var(--title-yellow); flex: 0.32; } 
        .t-space { flex: 0.08; text-align: center; color: transparent; } 
        .t-money { color: var(--title-green); flex: 0.28; } 
        .t-agent { color: var(--title-red); flex: 0.24; }
        
        #status-light {
            font-size: 0.8rem; color: #fff; margin: 15px auto 5px auto; background: rgba(0,0,0,0.3);
            padding: 4px 12px; border-radius: 12px; display: flex; align-items: center; gap: 6px;
        }
        .dot { width: 7px; height: 7px; background: #555; border-radius: 50%; transition: 0.3s; }
        
        .middle-section {
            width: 100%;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px 0;
        }

        .tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px 5px; text-align: center; font-weight: 800; color: rgba(255,255,255,0.3); font-size: 1rem; cursor: pointer; }
        .tab.active { color: #ffd700; border-bottom: 3px solid #ffd700; }
        
        .market-container { padding: 0 20px; }
        .content { display: none; } .content.active { display: block; }
        .input-box { border-radius: 15px; background: rgba(255, 255, 255, 0.04); margin-bottom: 15px; padding: 8px 15px; border: 1.5px solid rgba(0, 210, 255, 0.2); }
        input { width: 100%; border: none; background: transparent; font-size: 2.1rem; text-align: right; font-weight: 800; color: #fff; outline: none; }
        label { display: block; margin-bottom: 8px; font-weight: 800; color: #ffd700; font-size: 0.95rem; text-align: center; }
        
        .bottom-section { padding: 5px 5px 100px 5px; text-align: center; background: transparent; width: 100%; }
        .social-container { 
            display: flex; 
            justify-content: space-evenly; 
            align-items: center;
            margin-bottom: 15px;
            width: 100%;
        }
        .social-icon { font-size: 2.2rem; color: #fff; opacity: 0.8; transition: 0.2s; }
        .social-icon:hover { opacity: 1; transform: scale(1.1); }
        .messenger:hover { color: var(--messenger-clr); }
        .viber:hover { color: var(--viber-clr); }
        .telegram:hover { color: var(--telegram-clr); }
        .whatsapp:hover { color: var(--whatsapp-clr); }
        .line:hover { color: var(--line-clr); }
        
        .footer-clean { 
            padding-top: 5px; 
            font-size: 0.95rem; 
            font-weight: bold; 
            color: #fff; 
            opacity: 0.5; 
            display: block; 
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-inner">
        <div class="top-section">
            <div class="header">
                <div class="header-container">
                    <h1>ᗩᗰᕮᑎ<sup>®</sup></h1>
                    <div class="agent-title">
                        <span class="t-mobile"><span>M</span><span>o</span><span>b</span><span>i</span><span>l</span><span>e</span></span>
                        <span class="t-space">&nbsp;</span> <span class="t-money"><span>M</span><span>o</span><span>n</span><span>e</span><span>y</span></span>
                        <span class="t-space">&nbsp;</span> <span class="t-agent"><span>A</span><span>g</span><span>e</span><span>n</span><span>t</span></span>
                    </div>
                </div>
            </div>
            <div id="status-light"><span class="dot"></span> <span>Connecting...</span></div>
        </div>
        
        <div class="middle-section">
            <div class="tabs">
                <div class="tab active" onclick="openTab(event, 'buy')">ဘတ်ပေး_ကျပ်ယူ</div>
                <div class="tab" onclick="openTab(event, 'sell')">ကျပ်ပေး_ဘတ်ယူ</div>
            </div>

            <div class="market-container">
                <div id="buy" class="content active">
                    <label>ဘတ်ငွေပမာဏ {THB}</label>
                    <div class="input-box"><input type="text" id="thbBuy" placeholder="0" inputmode="decimal"></div>
                    <label>ကျပ်ငွေပမာဏ {MMK}</label>
                    <div class="input-box"><input type="text" id="mmkBuy" placeholder="0" inputmode="decimal"></div>
                </div>
                
                <div id="sell" class="content">
                    <label>ကျပ်ငွေပမာဏ {MMK}</label>
                    <div class="input-box"><input type="text" id="mmkSell" placeholder="0" inputmode="decimal"></div>
                    <label>ဘတ်ငွေပမာဏ {THB}</label>
                    <div class="input-box"><input type="text" id="thbSell" placeholder="0" inputmode="decimal"></div>
                </div>
            </div>
        </div>

        <div class="bottom-section">
            <div class="social-container">
                <a href="https://m.me/MobileMoneyAgent" class="social-icon messenger"><i class="fa-brands fa-facebook-messenger"></i></a>
                <a href="viber://chat?number=%2B66947841411" class="social-icon viber"><i class="fa-brands fa-viber"></i></a>
                <a href="https://t.me/amenmobilemoneyagent" class="social-icon telegram"><i class="fa-brands fa-telegram"></i></a>
                <a href="https://api.whatsapp.com/send?phone=66947841411" class="social-icon whatsapp"><i class="fa-brands fa-whatsapp"></i></a>
                <a href="https://line.me/ti/p/~mobilemoneyagent" class="social-icon line"><i class="fa-brands fa-line"></i></a>
            </div>
            <span class="footer-clean">Mobile Money Agent © 2026</span>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzELl1tVZ-b5nDWUmqdb1j13Vo_SSlSYUdPhL0NO9zfmRC0mZmqA8X9BEmFHoIk-faTYQ/exec';
    
    let SETTINGS = { buyBase: 780, sellBase: 760 };
    let lastActiveInput = null;

    async function syncData() {
        try {
            const res = await fetch(`${API_URL}?cache=${Date.now()}`);
            const data = await res.json();
            let isRateChanged = false;
            if (data.buyBase && parseFloat(data.buyBase) !== SETTINGS.buyBase) { SETTINGS.buyBase = parseFloat(data.buyBase); isRateChanged = true; }
            if (data.sellBase && parseFloat(data.sellBase) !== SETTINGS.sellBase) { SETTINGS.sellBase = parseFloat(data.sellBase); isRateChanged = true; }
            document.getElementById('status-light').innerHTML = '<span class="dot" style="background:#00ff6a;box-shadow:0 0 8px #00ff6a"></span> Live';
            if (isRateChanged && lastActiveInput) { lastActiveInput.dispatchEvent(new Event('input')); }
        } catch (e) {
            document.getElementById('status-light').innerHTML = '<span class="dot" style="background:red"></span> Offline';
        }
    }

    syncData();
    setInterval(syncData, 1000);

    const format = (v, isTyping = false) => {
        if (!v && v !== 0) return "";
        let parts = v.toString().split(".");
        parts[0] = parts[0].replace(/,/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        if (parts.length > 1) return parts[0] + "." + parts[1];
        return parts[0] + (isTyping && v.toString().includes(".") ? "." : "");
    };
    
    const raw = (v) => parseFloat(v.toString().replace(/,/g, "")) || 0;

    function getSmoothMultiplier(mmkAmount, isBuyTab) {
        let percentage = 1.0;
        
        if (mmkAmount <= 100000) {
            percentage = 1.0;
        } else if (mmkAmount >= 10000000) {
            percentage = 0.25;
        } else {
            let ratio = (mmkAmount - 100000) / (10000000 - 100000);
            percentage = 1.0 - (ratio * (1.0 - 0.25));
        }

        let rateFactor = percentage / 100;
        return isBuyTab ? (1.0 + rateFactor) : (1.0 - rateFactor);
    }

    document.getElementById('thbBuy').oninput = function() {
        lastActiveInput = this;
        let thb = raw(this.value); 
        this.value = format(this.value, true);
        if(!this.value) return document.getElementById('mmkBuy').value = "";
        
        let roughMMK = (thb / SETTINGS.buyBase) * 100000;
        let multiplier = getSmoothMultiplier(roughMMK, true);
        
        let baseTHB = thb / multiplier;
        let calculatedMMK = (baseTHB / SETTINGS.buyBase) * 100000;
        
        document.getElementById('mmkBuy').value = format(Math.floor(calculatedMMK));
    };

    document.getElementById('mmkBuy').oninput = function() {
        lastActiveInput = this;
        let mmk = raw(this.value); 
        this.value = format(this.value, true);
        if(!this.value) return document.getElementById('thbBuy').value = "";
        
        let baseTHB = (mmk / 100000) * SETTINGS.buyBase;
        let multiplier = getSmoothMultiplier(mmk, true);
        let finalTHB = baseTHB * multiplier; 
        
        document.getElementById('thbBuy').value = format(parseFloat(finalTHB.toFixed(2)));
    };

    document.getElementById('mmkSell').oninput = function() {
        lastActiveInput = this;
        let mmk = raw(this.value); 
        this.value = format(this.value, true);
        if(!this.value) return document.getElementById('thbSell').value = "";
        
        let baseTHB = (mmk / 100000) * SETTINGS.sellBase;
        let multiplier = getSmoothMultiplier(mmk, false);
        let finalTHB = baseTHB * multiplier;
        
        document.getElementById('thbSell').value = format(parseFloat(finalTHB.toFixed(2)));
    };
    
    document.getElementById('thbSell').oninput = function() {
        lastActiveInput = this;
        let thb = raw(this.value); 
        this.value = format(this.value, true);
        if(!this.value) return document.getElementById('mmkSell').value = "";
        
        let roughMMK = (thb / SETTINGS.sellBase) * 100000;
        let multiplier = getSmoothMultiplier(roughMMK, false);
        
        let baseTHB = thb / multiplier;
        let calculatedMMK = (baseTHB / SETTINGS.sellBase) * 100000;
        
        document.getElementById('mmkSell').value = format(Math.floor(calculatedMMK));
    };

    function openTab(e, name) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        e.currentTarget.classList.add('active');
        lastActiveInput = null;
    }
</script>
</body>
</html>
