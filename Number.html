<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=overlays-content">
    <title>ᗩᗰᕮᑎ Number App</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root { 
            --card-bg: #f8fafc; 
            --glow-blue: #0084ff;
            --glow-purple: #0072ff;
            --title-clr: #1e293b;
            --focus-border: #0072ff;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Courier Prime', monospace; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: calc(var(--vh, 1vh) * 100);
            width: 100vw;
            padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom) 12px;
            overflow: hidden;
        }

        .card { 
            width: 100%; 
            max-width: 380px; 
            height: 96vh;
            height: calc(var(--vh, 1vh) * 96);
            border-radius: 32px; 
            padding: 6px; 
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 15px 15px 40px #d1d9e6, -15px -15px 40px #ffffff;
            display: flex;
        }
        
        .card-inner { 
            background: var(--card-bg); 
            border-radius: 26px; 
            width: 100%; 
            height: 100%;
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            padding: 24px 20px;
            box-shadow: inset 4px 4px 8px #e6eef8, inset -4px -4px 8px #ffffff;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .card-inner::-webkit-scrollbar { display: none; }

        .brand-container { text-align: center; margin-bottom: 8px; width: 100%; }
        .brand-name { font-size: 3.8rem; color: #273549; font-family: 'MedievalSharp'; margin: 0; line-height: 0.95; letter-spacing: 2px; text-shadow: 1px 1px 0px #ffffff; display: inline-block; position: relative; }
        .sub-txt { font-size: 0.65rem; margin-top: 8px; font-weight: 700; letter-spacing: 4px; color: var(--title-clr); text-transform: uppercase; width: 100%; white-space: nowrap; text-align: center; }
        
        #num-status { 
            text-align: center; 
            font-size: 0.72rem; 
            margin: 6px auto 16px auto; 
            color: #64748b; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: bold; 
            background: #ebf0f6; 
            padding: 4px 14px; 
            border-radius: 50px; 
            display: inline-block; 
            box-shadow: inset 1px 1px 3px #cbd5e1, inset -1px -1px 3px #ffffff;
        }
        
        .input-row-grid { display: grid; grid-template-columns: 1.2fr 1fr 1.2fr; gap: 10px; margin-bottom: 16px; width: 100%; }
        .num-input-box { 
            background: transparent;
            border: none;
            border-bottom: 2px solid #cbd5e1; 
            border-radius: 0; 
            padding: 6px 2px; 
            transition: all 0.3s ease; 
            display: flex; 
            align-items: center; 
        }
        .num-input-box:focus-within { border-bottom-color: var(--focus-border); }
        .num-input-box input { width: 100%; border: none; background: transparent; font-size: 1.3rem; text-align: center; font-weight: bold; color: #1e293b; outline: none; font-family: 'Courier Prime', monospace; }
        .num-input-box input::placeholder { color: #94a3b8; font-size: 0.9rem; }
        
        #roundBtn { 
            border-radius: 50px; 
            font-family: 'Courier Prime', monospace; 
            font-weight: 700; 
            font-size: 0.8rem; 
            border: none; 
            background: #ebf0f6; 
            color: #64748b; 
            cursor: pointer;
            box-shadow: inset 2px 2px 4px #cbd5e1, inset -2px -2px 4px #ffffff;
            transition: all 0.25s ease;
            text-transform: uppercase;
        }
        
        button.action-btn { 
            height: 46px; 
            width: 100%; 
            border-radius: 50px; 
            font-family: 'Courier Prime', monospace; 
            font-weight: bold; 
            font-size: 0.95rem; 
            border: none; 
            background: linear-gradient(135deg, #0084ff, #0052d4); 
            color: #ffffff; 
            cursor: pointer; 
            transition: 0.2s; 
            text-transform: uppercase; 
            box-shadow: 0 4px 12px rgba(0, 82, 212, 0.25);
        }
        button.action-btn:active { transform: scale(0.98); }
        
        .card-btn { 
            height: 48px; 
            background: transparent; 
            color: #0072ff; 
            font-weight: 800; 
            border: 2px solid #0072ff; 
            border-radius: 50px; 
            width: 100%; 
            margin-top: 15px; 
            font-family: 'Courier Prime', monospace; 
            font-size: 1rem; 
            text-transform: uppercase; 
            transition: 0.2s; 
            cursor: pointer;
            flex-shrink: 0;
        }
        .card-btn:not(:disabled):active { background: linear-gradient(135deg, #0084ff, #0052d4); color: #ffffff; border-color: transparent; }
        .card-btn:disabled { background: #e2e8f0; color: #94a3b8; border-color: #cbd5e1; cursor: not-allowed; }
        
        #voucher { 
            background: #ffffff; 
            padding: 20px 15px; 
            width: 100%; 
            border-radius: 24px; 
            margin: 18px auto; 
            text-align: center; 
            border: 1px solid #e2e8f0; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
            color: #1e293b; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        #voucher::-webkit-scrollbar { display: none; }
        #voucher .brand-name { font-size: 2.8rem; color: #273549; }
        #voucher .sub-txt { color: #64748b; }
        
        .voucher-id { 
            font-weight: bold; 
            font-size: 1rem; 
            margin: 12px auto; 
            border: 1.5px dashed #cbd5e1; 
            padding: 8px; 
            width: 95%; 
            color: #0072ff; 
            border-radius: 10px; 
            background: #f8fafc;
            letter-spacing: 0.5px;
        }
        
        #ledgerList { width: 95%; margin: 10px auto; flex-grow: 1; }
        .ledger-row { display: flex; align-items: baseline; font-weight: bold; padding: 6px 0; font-size: 0.95rem; color: #334155; }
        .left-side { flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
        .dots { flex-grow: 1; border-bottom: 1.5px dotted #cbd5e1; margin: 0 8px; height: 10px; }
        .amount-side { flex-shrink: 0; color: #1e293b; }
        .delete-btn { color: #dc2626; cursor: pointer; font-weight: bold; font-size: 1rem; margin-left: 5px; }
        
        .footer-total { font-size: 1.1rem; font-weight: bold; display: flex; justify-content: space-between; margin-top: 15px; border-top: 2px dashed #cbd5e1; padding-top: 12px; color: #1e293b; }
        .footer-datetime { font-size: 0.75rem; color: #64748b; margin-top: 10px; text-align: center; font-weight: bold; }
        
        .custom-alert-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(15, 23, 42, 0.4); display: none; justify-content: center; align-items: center; z-index: 10000; backdrop-filter: blur(4px); }
        .custom-alert-box { background: #ffffff; border: none; border-radius: 24px; padding: 30px 25px; max-width: 320px; width: 85%; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .custom-alert-box button { height: 45px; width: 100%; background: linear-gradient(135deg, #0084ff, #0052d4); border: none; border-radius: 50px; color: #ffffff; font-weight: bold; font-family: 'Courier Prime', monospace; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 12px rgba(0, 82, 212, 0.2); }
    </style>
</head>
<body>

<div class="card number-app">
    <div class="card-inner">
        <div class="brand-container">
            <h1 class="brand-name">ᗩᗰᕮᑎ</h1>
            <div class="sub-txt">~ NUMBER ~</div>
        </div>
        
        <div id="num-status">Loading</div>
        
        <div class="input-row-grid">
            <div class="num-input-box"><input type="number" id="num" placeholder="Number"></div>
            <button id="roundBtn" onclick="toggleRound()">Round</button>
            <div class="num-input-box"><input type="number" id="amount" placeholder="Amount"></div>
        </div>
        
        <button class="action-btn" onclick="addToLedger()">ADD TO LIST</button>
        
        <div id="voucher">
            <div class="brand-container">
                <h1 class="brand-name">ᗩᗰᕮᑎ</h1>
                <div class="sub-txt">~ NUMBER ~</div>
            </div>
            <div class="voucher-id" id="vID">ID: --------</div>
            <div id="ledgerList"></div>
            <div style="width: 95%; margin: auto auto 0 auto;">
                <div class="footer-total">
                    <span>Total:</span>
                    <span><span id="grandTotal">0</span> THB</span>
                </div>
                <div id="fullDateTime" class="footer-datetime"></div>
            </div>
        </div>
        
        <button id="saveBtn" class="card-btn" onclick="saveVoucher()" disabled>Save & Send</button>
    </div>
</div>

<div id="customAlert" class="custom-alert-overlay">
    <div class="custom-alert-box">
        <div id="customAlertMsg" style="font-weight:bold; margin-bottom: 25px; line-height: 1.5; color: #1e293b;"></div>
        <button onclick="document.getElementById('customAlert').style.display='none'">OK</button>
    </div>
</div>

<script>
    function lockViewportHeight() {
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
    }
    lockViewportHeight();
    window.addEventListener('orientationchange', () => {
        setTimeout(lockViewportHeight, 200);
    });

    const NUM_API = 'https://script.google.com/macros/s/AKfycbw9MFGDcEHAiuN_OuvOW9gA0In1GbHCOXFn61SSUTNrRB55biewL55d5W2IFfsolMCA/exec';
    let isRound = false; let ledgerItems = []; let closed2D = [], closed3D = []; let currentVoucherID = "";

    function generateID() {
        let timestamp = Date.now().toString();
        let randomNum = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
        currentVoucherID = timestamp.slice(-6) + randomNum;
        document.getElementById('vID').innerText = "ID: " + currentVoucherID;
    }

    function updateClock() {
        const now = new Date();
        const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        document.getElementById('fullDateTime').innerText = 
            `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')} ${days[now.getDay()]} ${String(now.getDate()).padStart(2, '0')},${String(now.getMonth() + 1).padStart(2, '0')},${now.getFullYear()}`;
    }

    function renderLedger(isExport = false) {
        let list = document.getElementById('ledgerList'); list.innerHTML = "";
        ledgerItems.forEach((item, index) => {
            let deleteBtn = isExport ? "" : `<span class="delete-btn" onclick="deleteEntry(${index})">✕</span>`;
            list.innerHTML += `<div class="ledger-row"><div class="left-side">${item.n}${item.isRound?'(R)':''} ${deleteBtn}</div><div class="dots"></div><div class="amount-side">${item.amt.toLocaleString()} THB</div></div>`;
        });
        document.getElementById('grandTotal').innerText = ledgerItems.reduce((sum, item) => sum + item.total, 0).toLocaleString();
        document.getElementById('saveBtn').disabled = ledgerItems.length === 0;
    }

    function deleteEntry(index) { ledgerItems.splice(index, 1); renderLedger(); }
    setInterval(updateClock, 1000); updateClock(); generateID();

    async function fetchNumData() {
        try { 
            const res = await fetch(NUM_API); const data = await res.json(); 
            closed2D = data.closed2D || []; closed3D = data.closed3D || []; 
            document.getElementById('num-status').innerText = "Live"; 
            document.getElementById('num-status').style.color = "#0d9488"; 
        } catch(e) { 
            document.getElementById('num-status').innerText = "OFFLINE"; 
            document.getElementById('num-status').style.color = "#e11d48"; 
        }
    }

    function toggleRound() {
        isRound = !isRound;
        const btn = document.getElementById('roundBtn');
        btn.style.background = isRound ? 'linear-gradient(135deg, #0084ff, #0052d4)' : '#ebf0f6';
        btn.style.color = isRound ? '#fff' : '#64748b';
        btn.style.boxShadow = isRound ? '0 4px 10px rgba(0, 82, 212, 0.2)' : 'inset 2px 2px 4px #cbd5e1, inset -2px -2px 4px #ffffff';
    }

    function getAllPermutations(n) {
        if (n.length < 2) return [n]; let perms = [];
        for (let i = 0; i < n.length; i++) {
            let char = n[i]; let remaining = n.slice(0, i) + n.slice(i + 1);
            for (let subPerm of getAllPermutations(remaining)) perms.push(char + subPerm);
        }
        return [...new Set(perms)];
    }

    function showAlert(msg) {
        document.getElementById('customAlertMsg').innerText = msg;
        document.getElementById('customAlert').style.display = 'flex';
    }

    function addToLedger() {
        let n = document.getElementById('num').value; let a = parseInt(document.getElementById('amount').value);
        let permutations = getAllPermutations(n);
        
        if (ledgerItems.find(item => permutations.includes(item.n) || (isRound && item.isRound && permutations.some(p => p === item.n)))) 
            return showAlert("Number or its permutation already exists."); 

        if (n.length !== 2 && n.length !== 3) return showAlert("Invalid length."); 
        if (!n || !a) return;
        if (a < 5 || a > 500) return showAlert("Amount 5 - 500"); 
        if ((n.length === 2 && closed2D.includes(n)) || (n.length === 3 && closed3D.includes(n))) return showAlert("Number blocked."); 
        
        let hasTwoDigitsSame = (n.length === 3 && (n[0] === n[1] || n[1] === n[2] || n[0] === n[2]));
        let isTriple = (n.length === 3 && n[0] === n[1] && n[1] === n[2]);
        let isPair = (n.length === 2 && n[0] === n[1]);
        
        let multiplier = 1;
        if (isRound && !isPair && !isTriple) multiplier = (n.length === 2) ? 2 : (hasTwoDigitsSame ? 3 : 6);
        
        ledgerItems.push({ n, amt: a, total: a * multiplier, isRound: (isRound && !isPair && !isTriple) });
        renderLedger(); document.getElementById('num').value = ""; document.getElementById('amount').value = "";
    }

    function saveVoucher() {
        generateID(); renderLedger(true); 
        setTimeout(() => {
            html2canvas(document.getElementById('voucher'), { scale: 2, useCORS: true, backgroundColor: "#ffffff" }).then(canvas => { 
                let link = document.createElement('a'); 
                link.download = 'Voucher_' + currentVoucherID + '.png'; 
                link.href = canvas.toDataURL('image/png'); 
                link.click(); 
                
                setTimeout(() => {
                    window.open('https://t.me/amenmobilemoneyagent', '_blank');
                }, 500);

                ledgerItems = []; 
                renderLedger(false); 
            });
        }, 100);
    }
    fetchNumData();
</script>
</body>
</html>
