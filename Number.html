<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ᗩᗰᕮᑎ Number App</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root { 
            --card-bg: #1c232d; 
            --glow-blue: #00d2ff;
            --title-yellow: #ffff00; 
            --title-red: #ff0000;
            --title-purple: #b366ff;
            --neon-border: #00d2ff; 
            --focus-border: #ffd700;
            --input-focus-bg: #131922;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #05070a; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            width: 100vw;
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
        }

        /* Card Styles */
        .card { 
            width: 100%; 
            max-width: 420px; 
            height: 96%; 
            max-height: 780px; 
            border-radius: 30px; 
            padding: 2px; 
            background: var(--glow-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); 
            display: flex;
        }
        .card-inner { 
            background: var(--card-bg); 
            border-radius: 28px; 
            width: 100%; 
            height: 100%;
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            padding: 20px 15px;
        }

        /* NUMBER APP STYLES */
        .number-app { font-family: 'Courier Prime', monospace; align-items: center;}
        .brand-container { text-align: center; margin-bottom: 12px; width: 100%;}
        .brand-name { font-size: 3.5rem; color: white; font-family: 'MedievalSharp', sans-serif; line-height: 1; display: inline-flex; position: relative; }
        .brand-name sup { font-size: 0.45em; font-weight: normal; font-family: sans-serif; color: #ffffff; margin-left: 4px; position: relative; top: 0.15em; }
        .sub-txt { font-size: 0.9rem; font-weight: bold; letter-spacing: 4px; color: #ffd700; text-transform: uppercase; margin-top: 5px; }
        
        #num-status { text-align: center; font-size: 0.85rem; margin: 0 auto 12px auto; color: var(--title-purple); font-weight: bold; background: rgba(0, 0, 0, 0.3); padding: 4px 14px; border-radius: 12px; display: inline-block; }
        
        .input-row-grid { display: grid; grid-template-columns: 1.2fr 1fr 1.2fr; gap: 8px; margin-bottom: 12px; width: 100%; }
        .num-input-box { border-radius: 15px; background: var(--input-focus-bg); padding: 5px 8px; border: 2px solid var(--glow-blue); display: flex; align-items: center; }
        .num-input-box input { width: 100%; border: none; background: transparent; font-size: 1.15rem; text-align: center; font-weight: bold; color: #fff; outline: none; font-family: 'Courier Prime', monospace; }
        
        button.action-btn { height: 50px; width: 100%; border-radius: 15px; font-family: 'Courier Prime', monospace; font-weight: bold; font-size: 1.1rem; border: 2px solid var(--glow-blue); background: rgba(0, 210, 255, 0.05); color: var(--glow-blue); cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        button.action-btn:active { background: var(--glow-blue); color: #05070a; }
        #roundBtn { border-radius: 15px; font-family: 'Courier Prime', monospace; font-weight: bold; font-size: 0.95rem; border: 2px solid rgba(0, 210, 255, 0.5); background: var(--input-focus-bg); color: #fff; cursor: pointer;}
        
        .card-btn { height: 50px; background: transparent; color: var(--glow-blue); font-weight: 800; border: 2px solid var(--glow-blue); border-radius: 15px; width: 100%; margin-top: auto; font-family: 'Courier Prime', monospace; font-size: 1.05rem; text-transform: uppercase; transition: 0.2s; cursor: pointer;}
        .card-btn:not(:disabled):active { background: var(--glow-blue); color: #05070a; }
        .card-btn:disabled { background: #151a22; color: #444; border-color: #2c3545; cursor: not-allowed; }
        
        #voucher { background: #121820; padding: 15px; width: 100%; border-radius: 20px; margin: 15px auto; text-align: center; border: 2px solid var(--glow-blue); color: #fff; flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto;}
        #voucher .brand-name { font-size: 2.8rem; }
        .voucher-id { font-weight: bold; font-size: 1.1rem; margin: 12px auto; border: 1.5px dashed var(--glow-blue); padding: 8px; width: 95%; color: var(--glow-blue); border-radius: 10px; }
        
        #ledgerList { width: 95%; margin: 10px auto; flex-grow: 1; }
        .ledger-row { display: flex; align-items: baseline; font-weight: bold; padding: 6px 0; font-size: 0.95rem; color: #e0e0e0; }
        .left-side { flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
        .dots { flex-grow: 1; border-bottom: 1.5px dotted rgba(255,255,255,0.2); margin: 0 8px; height: 10px; }
        .amount-side { flex-shrink: 0; color: #ffffff; }
        .delete-btn { color: var(--title-red); cursor: pointer; font-weight: bold; font-size: 1rem; margin-left: 5px; }
        
        .footer-total { font-size: 1.1rem; font-weight: bold; display: flex; justify-content: space-between; margin-top: 15px; border-top: 2px dashed rgba(255,255,255,0.2); padding-top: 12px; }
        .footer-datetime { font-size: 0.8rem; color: #aaa; margin-top: 10px; text-align: center; font-weight: bold; }
        
        /* Custom Alert */
        .custom-alert-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(0,0,0,0.75); display: none; justify-content: center; align-items: center; z-index: 10000; backdrop-filter: blur(3px); }
        .custom-alert-box { background: var(--card-bg); border: 2px solid var(--glow-blue); border-radius: 20px; padding: 30px 25px; max-width: 320px; width: 85%; text-align: center; box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }
        .custom-alert-box button { height: 45px; width: 100%; background: var(--glow-blue); border: none; border-radius: 12px; color: #05070a; font-weight: bold; font-family: 'Courier Prime', monospace; font-size: 1rem; cursor: pointer;}
    </style>
</head>
<body>

<div class="card number-app">
    <div class="card-inner">
        <div class="brand-container">
            <h1 class="brand-name">ᗩᗰᕮᑎ<sup>®</sup></h1>
            <div class="sub-txt">~ NUMBER ~</div>
        </div>
        
        <div id="num-status">Loading</div>
        
        <div class="input-row-grid">
            <div class="num-input-box"><input type="number" id="num" placeholder="Number"></div>
            <button id="roundBtn" onclick="toggleRound()">Round</button>
            <div class="num-input-box"><input type="number" id="amount" placeholder="Amount"></div>
        </div>
        
        <button class="action-btn" onclick="addToLedger()">ADD TO LIST</button>
        
        <div id="voucher">
            <div class="brand-container">
                <h1 class="brand-name">ᗩᗰᕮᑎ<sup>®</sup></h1>
                <div class="sub-txt">~ NUMBER ~</div>
            </div>
            <div class="voucher-id" id="vID">ID: --------</div>
            <div id="ledgerList"></div>
            <div style="width: 95%; margin: auto auto 0 auto;">
                <div class="footer-total">
                    <span>Total:</span>
                    <span><span id="grandTotal">0</span> THB</span>
                </div>
                <div id="fullDateTime" class="footer-datetime"></div>
            </div>
        </div>
        
        <button id="saveBtn" class="card-btn" onclick="saveVoucher()" disabled>Save & Send</button>
    </div>
</div>

<div id="customAlert" class="custom-alert-overlay">
    <div class="custom-alert-box">
        <div id="customAlertMsg" style="font-weight:bold; margin-bottom: 25px; line-height: 1.5; color: #fff;"></div>
        <button onclick="document.getElementById('customAlert').style.display='none'">OK</button>
    </div>
</div>

<script>
    const NUM_API = 'https://script.google.com/macros/s/AKfycbw9MFGDcEHAiuN_OuvOW9gA0In1GbHCOXFn61SSUTNrRB55biewL55d5W2IFfsolMCA/exec';
    let isRound = false; let ledgerItems = []; let closed2D = [], closed3D = []; let currentVoucherID = "";

    function generateID() {
        let timestamp = Date.now().toString();
        let randomNum = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
        currentVoucherID = timestamp.slice(-6) + randomNum;
        document.getElementById('vID').innerText = "ID: " + currentVoucherID;
    }

    function updateClock() {
        const now = new Date();
        const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        document.getElementById('fullDateTime').innerText = 
            `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')} ${days[now.getDay()]},${String(now.getDate()).padStart(2, '0')},${String(now.getMonth() + 1).padStart(2, '0')},${now.getFullYear()}`;
    }

    function renderLedger(isExport = false) {
        let list = document.getElementById('ledgerList'); list.innerHTML = "";
        ledgerItems.forEach((item, index) => {
            let deleteBtn = isExport ? "" : `<span class="delete-btn" onclick="deleteEntry(${index})">✕</span>`;
            list.innerHTML += `<div class="ledger-row"><div class="left-side">${item.n}${item.isRound?'(R)':''} ${deleteBtn}</div><div class="dots"></div><div class="amount-side">${item.amt.toLocaleString()} THB</div></div>`;
        });
        document.getElementById('grandTotal').innerText = ledgerItems.reduce((sum, item) => sum + item.total, 0).toLocaleString();
        document.getElementById('saveBtn').disabled = ledgerItems.length === 0;
    }

    function deleteEntry(index) { ledgerItems.splice(index, 1); renderLedger(); }
    setInterval(updateClock, 1000); updateClock(); generateID();

    async function fetchNumData() {
        try { 
            const res = await fetch(NUM_API); const data = await res.json(); 
            closed2D = data.closed2D || []; closed3D = data.closed3D || []; 
            document.getElementById('num-status').innerText = "Live"; document.getElementById('num-status').style.color = "#00ff00"; 
        } catch(e) { 
            document.getElementById('num-status').innerText = "OFFLINE"; document.getElementById('num-status').style.color = "#ff4d4d"; 
        }
    }

    function toggleRound() {
        isRound = !isRound;
        document.getElementById('roundBtn').style.background = isRound ? 'var(--glow-blue)' : 'var(--input-focus-bg)';
        document.getElementById('roundBtn').style.color = isRound ? '#05070a' : '#fff';
        document.getElementById('roundBtn').style.borderColor = isRound ? 'var(--glow-blue)' : 'rgba(0, 210, 255, 0.5)';
    }

    function getAllPermutations(n) {
        if (n.length < 2) return [n]; let perms = [];
        for (let i = 0; i < n.length; i++) {
            let char = n[i]; let remaining = n.slice(0, i) + n.slice(i + 1);
            for (let subPerm of getAllPermutations(remaining)) perms.push(char + subPerm);
        }
        return [...new Set(perms)];
    }

    function showAlert(msg) {
        document.getElementById('customAlertMsg').innerText = msg;
        document.getElementById('customAlert').style.display = 'flex';
    }

    function addToLedger() {
        let n = document.getElementById('num').value; let a = parseInt(document.getElementById('amount').value);
        let permutations = getAllPermutations(n);
        
        if (ledgerItems.find(item => permutations.includes(item.n) || (isRound && item.isRound && permutations.some(p => p === item.n)))) 
            return showAlert("Number or its permutation already exists."); 

        if (n.length !== 2 && n.length !== 3) return showAlert("Invalid length."); 
        if (!n || !a) return;
        if (a < 5 || a > 500) return showAlert("Amount 5 - 500"); 
        if ((n.length === 2 && closed2D.includes(n)) || (n.length === 3 && closed3D.includes(n))) return showAlert("Number blocked."); 
        
        let hasTwoDigitsSame = (n.length === 3 && (n[0] === n[1] || n[1] === n[2] || n[0] === n[2]));
        let isTriple = (n.length === 3 && n[0] === n[1] && n[1] === n[2]);
        let isPair = (n.length === 2 && n[0] === n[1]);
        
        let multiplier = 1;
        if (isRound && !isPair && !isTriple) multiplier = (n.length === 2) ? 2 : (hasTwoDigitsSame ? 3 : 6);
        
        ledgerItems.push({ n, amt: a, total: a * multiplier, isRound: (isRound && !isPair && !isTriple) });
        renderLedger(); document.getElementById('num').value = ""; document.getElementById('amount').value = "";
    }

    function saveVoucher() {
        generateID(); renderLedger(true); 
        setTimeout(() => {
            html2canvas(document.getElementById('voucher'), { scale: 2, useCORS: true, backgroundColor: null }).then(canvas => { 
                let link = document.createElement('a'); 
                link.download = 'Voucher_' + currentVoucherID + '.png'; 
                link.href = canvas.toDataURL('image/png'); 
                link.click(); 
                
                setTimeout(() => {
                    window.open('https://t.me/amenmobilemoneyagent', '_blank');
                }, 500);

                ledgerItems = []; 
                renderLedger(false); 
            });
        }, 100);
    }
    fetchNumData();
</script>
</body>
</html>
